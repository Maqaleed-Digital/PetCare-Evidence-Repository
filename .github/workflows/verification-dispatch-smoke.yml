name: verification-index-dispatch-smoke

"on":
  workflow_dispatch:
    inputs:
      prod_zip_sha256:
        description: "Required for smoke: provide sha256"
        required: true
        type: string

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Echo input
        run: |
          set -euo pipefail
          echo "prod_zip_sha256=${{ inputs.prod_zip_sha256 }}"

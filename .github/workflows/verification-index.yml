name: verification-index

"on":
  release:
    types: [published]

  workflow_dispatch:
    inputs:
      prod_zip_sha256:
        description: "Optional: production ZIP SHA256 to gate. If blank, release event auto-resolves from *.zip.sha256 asset."
        required: false
        type: string

permissions:
  contents: read

jobs:
  index-integrity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify verification index integrity (precondition)
        run: |
          set -euo pipefail
          python3 petcare_execution/scripts/petcare_verification_index_verify.py --index petcare_execution/FND/VERIFICATION_INDEX.json

  release-gate:
    runs-on: ubuntu-latest
    needs: [index-integrity]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve PROD_ZIP_SHA256 (manual input OR auto from release asset)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MANUAL_SHA: ${{ inputs.prod_zip_sha256 }}
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          if [ -n "${MANUAL_SHA}" ]; then
            echo "PROD_ZIP_SHA256=${MANUAL_SHA}" >> "${GITHUB_ENV}"
            echo "Resolved from manual input."
            exit 0
          fi

          if [ "${EVENT_NAME}" != "release" ]; then
            echo "ERROR: No manual SHA provided and event is not 'release'."
            echo "Provide inputs.prod_zip_sha256 for workflow_dispatch."
            exit 2
          fi

          if [ -z "${RELEASE_TAG}" ]; then
            echo "ERROR: release tag missing"
            exit 3
          fi

          API_URL="https://api.github.com/repos/${REPO}/releases/tags/${RELEASE_TAG}"
          curl -fsSL \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "${API_URL}" > release.json

          SHA_URL="$(python3 - <<'PY'
import json
d=json.load(open("release.json","r",encoding="utf-8"))
assets=d.get("assets") or []
want=[a for a in assets if isinstance(a.get("name"),str) and a["name"].endswith(".zip.sha256")]
want.sort(key=lambda a: a.get("name",""))
if not want:
    raise SystemExit(10)
print(want[0].get("browser_download_url",""))
PY
)"
          if [ -z "${SHA_URL}" ]; then
            echo "ERROR: no *.zip.sha256 asset found on release ${RELEASE_TAG}"
            exit 4
          fi

          curl -fsSL \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/octet-stream" \
            "${SHA_URL}" > prod.zip.sha256

          PROD_SHA="$(awk '{print $1}' < prod.zip.sha256 | head -n 1 | tr -d '[:space:]')"
          if [ -z "${PROD_SHA}" ]; then
            echo "ERROR: downloaded sha is empty/invalid"
            exit 6
          fi

          echo "PROD_ZIP_SHA256=${PROD_SHA}" >> "${GITHUB_ENV}"
          echo "Resolved from release asset."

      - name: Enforce policy for production zip sha (sha-based gate)
        env:
          PROD_ZIP_SHA256: ${{ env.PROD_ZIP_SHA256 }}
        run: |
          set -euo pipefail
          if [ -z "${PROD_ZIP_SHA256}" ]; then
            echo "ERROR: PROD_ZIP_SHA256 empty"
            exit 10
          fi
          bash petcare_execution/scripts/petcare_verification_policy_check_sha.sh "${PROD_ZIP_SHA256}" "petcare_execution/FND/VERIFICATION_INDEX.json"

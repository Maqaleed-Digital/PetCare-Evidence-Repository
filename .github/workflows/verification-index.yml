name: verification-index

on:
  push:
    branches: [ "main" ]
  pull_request:
  workflow_dispatch:
    inputs:
      prod_zip_sha256:
        description: "Production closure ZIP sha256 to verify against petcare_execution/FND/VERIFICATION_INDEX.json"
        required: true
        type: string

jobs:
  index-integrity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify verification index integrity
        run: |
          python3 petcare_execution/scripts/petcare_verification_index_verify.py --index petcare_execution/FND/VERIFICATION_INDEX.json

  release-policy-gate:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify verification index integrity (precondition)
        run: |
          python3 petcare_execution/scripts/petcare_verification_index_verify.py --index petcare_execution/FND/VERIFICATION_INDEX.json

      - name: Enforce policy for production zip sha
        env:
          PROD_ZIP_SHA256: ${{ inputs.prod_zip_sha256 }}
        run: |
          bash petcare_execution/scripts/petcare_verification_policy_check_sha.sh "${PROD_ZIP_SHA256}" "petcare_execution/FND/VERIFICATION_INDEX.json"

name: ci

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Create venv + install deps (LOCKFILE-FIRST)
        shell: bash
        run: |
          set -euo pipefail
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip

          if [ ! -f requirements.lock ]; then
            echo "FAIL: requirements.lock missing (lockfile-first policy)"
            exit 20
          fi

          pip install -r requirements.lock

          if [ -f requirements-dev.txt ]; then
            pip install -r requirements-dev.txt
          fi

      - name: CI gates (local simulation)
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/petcare_ci_gates.sh

      - name: Evidence publication (PH31)
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/petcare_ph31_closure_pack.sh

      - name: Upload evidence artifacts
        uses: actions/upload-artifact@v4
        with:
          name: petcare-evidence
          path: |
            evidence_output/**/*

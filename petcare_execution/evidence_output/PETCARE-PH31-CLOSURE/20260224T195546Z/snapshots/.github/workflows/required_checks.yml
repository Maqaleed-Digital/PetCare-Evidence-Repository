name: Required Checks

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  required:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Create venv + install deps
        run: |
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: CI preflight
        run: |
          bash scripts/petcare_ci_preflight.sh

      - name: Deterministic tests
        run: |
          bash scripts/run_tests_deterministic.sh

      - name: Policy drift check
        run: |
          bash scripts/petcare_policy_drift_check.sh

      - name: Registry drift check
        run: |
          bash scripts/petcare_registry_drift_check.sh

name: CI

on:
  push:
  pull_request:

jobs:
  test-and-evidence:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Create venv + install deps
        shell: bash
        run: |
          set -euo pipefail
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          if [ -f requirements-dev.txt ]; then
            pip install -r requirements-dev.txt
          fi
          python -m pip freeze | sort | sed -n '1,200p'

      - name: Run CI gates (syntax + deps + tests)
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/petcare_ci_gates.sh

      - name: Build deterministic evidence bundle (PH31)
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/petcare_ph31_closure_pack.sh
          echo ""
          echo "=== LATEST PH31 ZIP ==="
          ls -1t evidence_output/PETCARE-PH31-CLOSURE/*.zip | head -n 1

      - name: Upload PH31 evidence zip+sha
        uses: actions/upload-artifact@v4
        with:
          name: PETCARE-PH31-CLOSURE
          path: |
            evidence_output/PETCARE-PH31-CLOSURE/*.zip
            evidence_output/PETCARE-PH31-CLOSURE/*.zip.sha256

openapi: 3.1.0
info:
  title: PetCare Partner Integration API
  version: 1.0.0
  summary: Governed external platform API for controlled partner integration
  description: |
    PetCare external API surface for partner-scoped read access, controlled write request intake,
    webhook subscriptions, and audit-visible integration behavior.
servers:
  - url: https://api.petcare.example.com/v1
    description: Production
  - url: https://sandbox-api.petcare.example.com/v1
    description: Sandbox
security:
  - OAuth2ClientCredentials: []
tags:
  - name: Partner
  - name: Orders
  - name: Referrals
  - name: Availability
  - name: Catalog
  - name: Webhooks
  - name: Events
paths:
  /partner/profile:
    get:
      tags: [Partner]
      operationId: getPartnerProfile
      summary: Get authenticated partner profile
      security:
        - OAuth2ClientCredentials: [partner.read]
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/PartnerIdHeader'
        - $ref: '#/components/parameters/RequestIdHeader'
        - $ref: '#/components/parameters/TimestampHeader'
      responses:
        '200':
          description: Partner profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PartnerProfile'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /orders:
    get:
      tags: [Orders]
      operationId: listOrders
      summary: List partner-owned orders
      security:
        - OAuth2ClientCredentials: [orders.read]
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/PartnerIdHeader'
        - $ref: '#/components/parameters/RequestIdHeader'
        - $ref: '#/components/parameters/TimestampHeader'
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/OrderStatus'
        - in: query
          name: created_from
          schema:
            type: string
            format: date-time
        - in: query
          name: created_to
          schema:
            type: string
            format: date-time
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - in: query
          name: external_reference
          schema:
            type: string
      responses:
        '200':
          description: Order list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderListResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
    post:
      tags: [Orders]
      operationId: createOrderRequest
      summary: Create order request for internal governed processing
      security:
        - OAuth2ClientCredentials: [orders.write_request]
      parameters:
        - $ref: '#/components/parameters/PartnerIdHeader'
        - $ref: '#/components/parameters/RequestIdHeader'
        - $ref: '#/components/parameters/TimestampHeader'
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderRequest'
      responses:
        '202':
          description: Order request accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcceptedOrderResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /orders/{order_id}:
    get:
      tags: [Orders]
      operationId: getOrder
      summary: Get a single partner-owned order
      security:
        - OAuth2ClientCredentials: [orders.read]
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/PartnerIdHeader'
        - $ref: '#/components/parameters/RequestIdHeader'
        - $ref: '#/components/parameters/TimestampHeader'
        - in: path
          name: order_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Order detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderSummary'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /referrals:
    get:
      tags: [Referrals]
      operationId: listReferrals
      summary: List partner-owned referrals
      security:
        - OAuth2ClientCredentials: [referrals.read]
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/PartnerIdHeader'
        - $ref: '#/components/parameters/RequestIdHeader'
        - $ref: '#/components/parameters/TimestampHeader'
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/ReferralStatus'
        - in: query
          name: created_from
          schema:
            type: string
            format: date-time
        - in: query
          name: created_to
          schema:
            type: string
            format: date-time
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Referral list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReferralListResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
    post:
      tags: [Referrals]
      operationId: createReferralRequest
      summary: Create referral request for internal governed review
      security:
        - OAuth2ClientCredentials: [referrals.write_request]
      parameters:
        - $ref: '#/components/parameters/PartnerIdHeader'
        - $ref: '#/components/parameters/RequestIdHeader'
        - $ref: '#/components/parameters/TimestampHeader'
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReferralRequest'
      responses:
        '202':
          description: Referral request accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcceptedReferralResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /referrals/{referral_id}:
    get:
      tags: [Referrals]
      operationId: getReferral
      summary: Get a single partner-owned referral
      security:
        - OAuth2ClientCredentials: [referrals.read]
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/PartnerIdHeader'
        - $ref: '#/components/parameters/RequestIdHeader'
        - $ref: '#/components/parameters/TimestampHeader'
        - in: path
          name: referral_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Referral detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReferralSummary'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /availability:
    put:
      tags: [Availability]
      operationId: submitAvailability
      summary: Submit partner availability state
      security:
        - OAuth2ClientCredentials: [availability.write]
      parameters:
        - $ref: '#/components/parameters/PartnerIdHeader'
        - $ref: '#/components/parameters/RequestIdHeader'
        - $ref: '#/components/parameters/TimestampHeader'
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AvailabilityRequest'
      responses:
        '202':
          description: Availability request accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcceptedAvailabilityResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /catalog/batches:
    post:
      tags: [Catalog]
      operationId: submitCatalogBatch
      summary: Submit catalog items for validation and ingestion
      security:
        - OAuth2ClientCredentials: [catalog.write]
      parameters:
        - $ref: '#/components/parameters/PartnerIdHeader'
        - $ref: '#/components/parameters/RequestIdHeader'
        - $ref: '#/components/parameters/TimestampHeader'
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CatalogBatchRequest'
      responses:
        '202':
          description: Catalog batch accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcceptedCatalogBatchResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /catalog/batches/{catalog_batch_id}:
    get:
      tags: [Catalog]
      operationId: getCatalogBatch
      summary: Get catalog batch processing status
      security:
        - OAuth2ClientCredentials: [catalog.write]
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/PartnerIdHeader'
        - $ref: '#/components/parameters/RequestIdHeader'
        - $ref: '#/components/parameters/TimestampHeader'
        - in: path
          name: catalog_batch_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Catalog batch detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CatalogBatch'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /webhook-subscriptions:
    get:
      tags: [Webhooks]
      operationId: listWebhookSubscriptions
      summary: List webhook subscriptions
      security:
        - OAuth2ClientCredentials: [webhooks.manage]
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/PartnerIdHeader'
        - $ref: '#/components/parameters/RequestIdHeader'
        - $ref: '#/components/parameters/TimestampHeader'
      responses:
        '200':
          description: Webhook subscriptions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookSubscriptionListResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
    post:
      tags: [Webhooks]
      operationId: createWebhookSubscription
      summary: Create webhook subscription
      security:
        - OAuth2ClientCredentials: [webhooks.manage]
      parameters:
        - $ref: '#/components/parameters/PartnerIdHeader'
        - $ref: '#/components/parameters/RequestIdHeader'
        - $ref: '#/components/parameters/TimestampHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWebhookSubscriptionRequest'
      responses:
        '201':
          description: Webhook subscription created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookSubscription'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /webhook-subscriptions/{subscription_id}/pause:
    post:
      tags: [Webhooks]
      operationId: pauseWebhookSubscription
      summary: Pause webhook subscription
      security:
        - OAuth2ClientCredentials: [webhooks.manage]
      parameters:
        - $ref: '#/components/parameters/PartnerIdHeader'
        - $ref: '#/components/parameters/RequestIdHeader'
        - $ref: '#/components/parameters/TimestampHeader'
        - in: path
          name: subscription_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Webhook subscription updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookSubscription'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /webhook-subscriptions/{subscription_id}/resume:
    post:
      tags: [Webhooks]
      operationId: resumeWebhookSubscription
      summary: Resume webhook subscription
      security:
        - OAuth2ClientCredentials: [webhooks.manage]
      parameters:
        - $ref: '#/components/parameters/PartnerIdHeader'
        - $ref: '#/components/parameters/RequestIdHeader'
        - $ref: '#/components/parameters/TimestampHeader'
        - in: path
          name: subscription_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Webhook subscription updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookSubscription'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /webhook-subscriptions/{subscription_id}:
    delete:
      tags: [Webhooks]
      operationId: disableWebhookSubscription
      summary: Disable webhook subscription
      security:
        - OAuth2ClientCredentials: [webhooks.manage]
      parameters:
        - $ref: '#/components/parameters/PartnerIdHeader'
        - $ref: '#/components/parameters/RequestIdHeader'
        - $ref: '#/components/parameters/TimestampHeader'
        - in: path
          name: subscription_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Webhook subscription disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookSubscription'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /events/{event_id}:
    get:
      tags: [Events]
      operationId: getEventDeliveryRecord
      summary: Get event delivery record
      security:
        - OAuth2ClientCredentials: [events.read]
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/PartnerIdHeader'
        - $ref: '#/components/parameters/RequestIdHeader'
        - $ref: '#/components/parameters/TimestampHeader'
        - in: path
          name: event_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Event delivery record
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventDeliveryRecord'
        default:
          $ref: '#/components/responses/ErrorResponse'
components:
  securitySchemes:
    OAuth2ClientCredentials:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://auth.petcare.example.com/oauth/token
          scopes:
            partner.read: Read partner profile
            orders.read: Read partner-owned orders
            orders.write_request: Create governed order requests
            referrals.read: Read partner-owned referrals
            referrals.write_request: Create governed referral requests
            availability.write: Submit availability state
            catalog.write: Submit catalog batches and view batch status
            webhooks.manage: Manage webhook subscriptions
            events.read: Read event delivery records
            audit.read_receipts: Read audit receipt metadata
    ApiKeyAuth:
      type: apiKey
      in: header
      name: Authorization
  parameters:
    PartnerIdHeader:
      in: header
      name: X-PetCare-Partner-Id
      required: true
      schema:
        type: string
    RequestIdHeader:
      in: header
      name: X-PetCare-Request-Id
      required: true
      schema:
        type: string
    TimestampHeader:
      in: header
      name: X-PetCare-Timestamp
      required: true
      schema:
        type: string
        format: date-time
    IdempotencyKeyHeader:
      in: header
      name: Idempotency-Key
      required: true
      schema:
        type: string
    Page:
      in: query
      name: page
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      in: query
      name: page_size
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 25
  responses:
    ErrorResponse:
      description: Error response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
  schemas:
    PartnerProfile:
      type: object
      required:
        - partner_id
        - tenant_id
        - legal_name
        - display_name
        - integration_status
        - allowed_scopes
        - webhook_capable
        - sandbox_certification_status
        - created_at
        - updated_at
      properties:
        partner_id:
          type: string
        tenant_id:
          type: string
        legal_name:
          type: string
        display_name:
          type: string
        integration_status:
          type: string
          enum: [PENDING, ACTIVE, SUSPENDED, REVOKED]
        allowed_scopes:
          type: array
          items:
            type: string
        webhook_capable:
          type: boolean
        sandbox_certification_status:
          type: string
          enum: [NOT_STARTED, IN_PROGRESS, CERTIFIED, EXPIRED]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    OrderStatus:
      type: string
      enum:
        - REQUEST_RECEIVED
        - PENDING_INTERNAL_REVIEW
        - PENDING_APPROVAL
        - APPROVED_FOR_EXECUTION
        - IN_EXECUTION
        - COMPLETED
        - REJECTED
        - CANCELLED
    GovernanceState:
      type: string
      enum:
        - GOVERNED
        - AWAITING_REVIEW
        - AWAITING_APPROVAL
        - RESTRICTED
        - CLOSED
    ApprovalState:
      type: string
      enum:
        - NOT_REQUIRED
        - PENDING
        - APPROVED
        - REJECTED
    OrderSummary:
      type: object
      required:
        - order_id
        - partner_id
        - tenant_id
        - order_type
        - status
        - governance_state
        - approval_state
        - amount_currency
        - amount_value
        - created_at
        - updated_at
      properties:
        order_id:
          type: string
        partner_id:
          type: string
        tenant_id:
          type: string
        external_reference:
          type: string
        order_type:
          type: string
        status:
          $ref: '#/components/schemas/OrderStatus'
        governance_state:
          $ref: '#/components/schemas/GovernanceState'
        approval_state:
          $ref: '#/components/schemas/ApprovalState'
        amount_currency:
          type: string
        amount_value:
          type: number
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    ReferralStatus:
      type: string
      enum:
        - REQUEST_RECEIVED
        - TRIAGE_PENDING
        - UNDER_REVIEW
        - ACCEPTED
        - REJECTED
        - CLOSED
    ReferralSummary:
      type: object
      required:
        - referral_id
        - partner_id
        - tenant_id
        - referral_type
        - status
        - governance_state
        - created_at
        - updated_at
      properties:
        referral_id:
          type: string
        partner_id:
          type: string
        tenant_id:
          type: string
        pet_id_reference:
          type: string
        referral_type:
          type: string
        status:
          $ref: '#/components/schemas/ReferralStatus'
        internal_case_id:
          type: string
        governance_state:
          $ref: '#/components/schemas/GovernanceState'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    AvailabilityCapacityStatus:
      type: string
      enum: [AVAILABLE, LIMITED, UNAVAILABLE, EMERGENCY_ONLY]
    AvailabilityRequest:
      type: object
      required:
        - tenant_id
        - site_id
        - service_window_start
        - service_window_end
        - capacity_status
        - effective_from
      properties:
        tenant_id:
          type: string
        site_id:
          type: string
        service_window_start:
          type: string
          format: date-time
        service_window_end:
          type: string
          format: date-time
        capacity_status:
          $ref: '#/components/schemas/AvailabilityCapacityStatus'
        notes:
          type: string
        effective_from:
          type: string
          format: date-time
    CatalogItem:
      type: object
      required:
        - item_code
        - item_name
        - item_type
        - unit_price
        - currency
        - active
      properties:
        item_code:
          type: string
        item_name:
          type: string
        item_type:
          type: string
        unit_price:
          type: number
        currency:
          type: string
        active:
          type: boolean
        inventory_hint:
          type: string
        metadata:
          type: object
          additionalProperties: true
    CatalogBatchRequest:
      type: object
      required:
        - tenant_id
        - batch_reference
        - items
      properties:
        tenant_id:
          type: string
        batch_reference:
          type: string
        items:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/CatalogItem'
    CatalogBatch:
      type: object
      required:
        - catalog_batch_id
        - partner_id
        - tenant_id
        - submitted_item_count
        - accepted_item_count
        - rejected_item_count
        - processing_status
        - submitted_at
      properties:
        catalog_batch_id:
          type: string
        partner_id:
          type: string
        tenant_id:
          type: string
        submitted_item_count:
          type: integer
        accepted_item_count:
          type: integer
        rejected_item_count:
          type: integer
        processing_status:
          type: string
          enum: [RECEIVED, VALIDATING, PARTIALLY_ACCEPTED, ACCEPTED, REJECTED]
        submitted_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
    CreateWebhookSubscriptionRequest:
      type: object
      required:
        - endpoint_url
        - subscribed_event_types
      properties:
        endpoint_url:
          type: string
          format: uri
        subscribed_event_types:
          type: array
          minItems: 1
          items:
            type: string
            enum:
              - order.created
              - order.updated
              - referral.created
              - referral.updated
              - availability.updated
              - catalog.batch.completed
              - webhook.subscription.disabled
              - settlement.generated
              - dispute.opened
    WebhookSubscription:
      type: object
      required:
        - subscription_id
        - partner_id
        - tenant_id
        - endpoint_url
        - subscribed_event_types
        - status
        - signing_key_id
        - created_at
        - updated_at
      properties:
        subscription_id:
          type: string
        partner_id:
          type: string
        tenant_id:
          type: string
        endpoint_url:
          type: string
          format: uri
        subscribed_event_types:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [ACTIVE, PAUSED, DISABLED, ROTATION_PENDING]
        signing_key_id:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    EventDeliveryRecord:
      type: object
      required:
        - event_id
        - event_type
        - subscription_id
        - delivery_status
        - attempt_count
        - trace_id
        - payload_hash
        - signature_key_id
      properties:
        event_id:
          type: string
        event_type:
          type: string
        subscription_id:
          type: string
        delivery_status:
          type: string
          enum: [PENDING, DELIVERED, RETRY_SCHEDULED, FAILED, DISABLED]
        attempt_count:
          type: integer
        last_attempt_at:
          type: string
          format: date-time
        next_retry_at:
          type: string
          format: date-time
        trace_id:
          type: string
        payload_hash:
          type: string
        signature_key_id:
          type: string
    CreateOrderRequest:
      type: object
      required:
        - external_reference
        - tenant_id
        - order_type
        - line_items
      properties:
        external_reference:
          type: string
        tenant_id:
          type: string
        order_type:
          type: string
        line_items:
          type: array
          minItems: 1
          items:
            type: object
            required: [item_code, quantity]
            properties:
              item_code:
                type: string
              quantity:
                type: number
              unit_of_measure:
                type: string
              notes:
                type: string
        requested_fulfillment_window:
          type: object
          additionalProperties: true
        delivery_constraints:
          type: object
          additionalProperties: true
        metadata:
          type: object
          additionalProperties: true
    AcceptedOrderResponse:
      type: object
      required:
        - order_id
        - governance_state
        - trace_id
        - status
      properties:
        order_id:
          type: string
        governance_state:
          $ref: '#/components/schemas/GovernanceState'
        trace_id:
          type: string
        status:
          $ref: '#/components/schemas/OrderStatus'
    CreateReferralRequest:
      type: object
      required:
        - external_reference
        - tenant_id
        - referral_type
        - pet_id_reference
        - referral_reason
      properties:
        external_reference:
          type: string
        tenant_id:
          type: string
        referral_type:
          type: string
        pet_id_reference:
          type: string
        referral_reason:
          type: string
        requested_service_date:
          type: string
          format: date-time
        attachments:
          type: array
          items:
            type: object
            additionalProperties: true
        metadata:
          type: object
          additionalProperties: true
    AcceptedReferralResponse:
      type: object
      required:
        - referral_id
        - governance_state
        - trace_id
        - status
      properties:
        referral_id:
          type: string
        governance_state:
          $ref: '#/components/schemas/GovernanceState'
        trace_id:
          type: string
        status:
          $ref: '#/components/schemas/ReferralStatus'
    AcceptedAvailabilityResponse:
      type: object
      required:

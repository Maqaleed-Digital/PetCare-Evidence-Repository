options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _REGION: "me-central2"
  _ARTIFACT_REPO: "petcare-artifacts"
  _IMAGE_NAME: "petcare-api"
  _SERVICE_NAME: "petcare-api-nonprod"
  _PLATFORM_PROJECT: ""
  _DEPLOY_SA_EMAIL: ""
  _RUNTIME_SECRET_ENV: "PETCARE_RUNTIME_CONFIG"
  _RUNTIME_SECRET_NAME: "petcare-runtime-config-nonprod"

steps:
  - name: "gcr.io/cloud-builders/docker"
    id: "build-image"
    args:
      - "build"
      - "-t"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_IMAGE_NAME}:${SHORT_SHA}"
      - "-t"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_IMAGE_NAME}:candidate-${SHORT_SHA}"
      - "."

  - name: "gcr.io/cloud-builders/docker"
    id: "push-short-sha"
    args:
      - "push"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_IMAGE_NAME}:${SHORT_SHA}"

  - name: "gcr.io/cloud-builders/docker"
    id: "push-candidate"
    args:
      - "push"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_IMAGE_NAME}:candidate-${SHORT_SHA}"

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk:slim"
    id: "deploy-nonprod"
    entrypoint: "bash"
    args:
      - "-euo"
      - "pipefail"
      - "-c"
      - |
        IMAGE_URI="${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_IMAGE_NAME}:${SHORT_SHA}"
        gcloud run deploy "${_SERVICE_NAME}" \
          --project="${_PLATFORM_PROJECT}" \
          --region="${_REGION}" \
          --platform=managed \
          --service-account="${_DEPLOY_SA_EMAIL}" \
          --image="${IMAGE_URI}" \
          --quiet \
          --allow-unauthenticated \
          --update-secrets="${_RUNTIME_SECRET_ENV}=${_RUNTIME_SECRET_NAME}:latest" \
          --labels="env=nonprod,phase=df03,managed-by=cloud-build"

images:
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_IMAGE_NAME}:${SHORT_SHA}"
